<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>JJK Character Creator</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>JJK CHARACTER CREATOR</h1>

  <label>Choose a Curse Technique:</label><br>
  <select id="techniques">
    <option value="empty" power="0">None</option>
    <option value="eyes" power="100">Six Eyes</option>
    <option value="limitless" power="100">Limitless</option>
    <option value="shrine" power="100">Shrine</option>
    <option value="boogie" power="40">Boogie Woogie</option>
    <option value="shadows" power="60">Ten Shadows</option>
    <option value="restriction" power="80">Heavenly Restriction</option>
    <option value="transfiguration" power="70">Idle Transfiguration</option>
    <option value="ratio" power="40">Ratio</option>
    <option value="star" power="80">Star Rage</option>
    <option value="projection" power="50">Projection Sorcery</option>
  </select>

  <br><br>

  <label>Choose a Weapon:</label><br>
  <select id="weapons">
    <option value="empty" power="0">None</option>
    <option value="soulsplit" power="90">Soul Split Katana</option>
    <option value="cloud" power="90">Playful Cloud</option>
    <option value="spear" power="80">Inverted Spear of Heaven</option>
    <option value="rope" power="50">Black Rope</option>
    <option value="executioner" power="100">Executioner's Sword</option>
    <option value="dragon" power="30">Dragon-Bone</option>
    <option value="kamutoke" power="100">Kamutoke</option>
  </select>

  <br><br>

  <label>Choose a Species:</label><br>
  <select id="species">
    <option value="human" power="5">Human</option>
    <option value="curse" power="3">Curse</option>
    <option value="disaster" power="80">Disaster Curse</option>
    <option value="reincarnation" power="90">Reincarnation</option>
    <option value="painting" power="65">Death Painting</option>
    <option value="vessel" power="65">Vessel</option>
    <option value="vengeful" power="80">Vengeful Spirit</option>
  </select>

  <br><br>

  <label>Choose a Domain:</label><br>
  <select id="domains">
    <option value="empty" power="0">None</option>
    <option value="barrier" power="70">Barrier</option>
    <option value="incomplete" power="50">Incomplete</option>
    <option value="barrierless" power="100">Barrierless</option>
  </select>

  <br><br>

  <label>Cursed Energy:</label><br>
  <input type="range" id="ce" min="0" max="200" value="50">
  <p>Current Cursed Energy: <span id="valueOutput">50</span></p>

  <p>Total Power: <span id="power">0</span></p>

  <p class="grade-display">Grade: <span id="grade">Grade 4</span></p>

  <script>
    var slider = document.getElementById("ce");
    var output = document.getElementById("valueOutput");
    var totalPowerOutput = document.getElementById("power");
    var gradeOutput = document.getElementById("grade");

    var techniques = document.getElementById("techniques");
    var weapons = document.getElementById("weapons");
    var species = document.getElementById("species");
    var domains = document.getElementById("domains");

    function calculatePower() {
      var cePower = parseInt(slider.value);

      var techniquePower = parseInt(techniques.selectedOptions[0].getAttribute("power"));
      var techniqueType = techniques.selectedOptions[0].getAttribute("value");
      var weaponPower = parseInt(weapons.selectedOptions[0].getAttribute("power"));
      var speciesPower = parseInt(species.selectedOptions[0].getAttribute("power"));
      var domainPower = parseInt(domains.selectedOptions[0].getAttribute("power"));

      if (techniqueType == restriction && cePower == 0) {
        techniquePower = 200;
      }

      var total = cePower + techniquePower + weaponPower + speciesPower + domainPower;


      totalPowerOutput.innerHTML = total;
      output.innerHTML = cePower;

      var grade;

      if (total >= 400) {
        grade = "Special Grade";
        gradeOutput.className = "special";
      } else if (total >= 320) {
        grade = "Semi-Grade 1";
        gradeOutput.className = "semi";
      } else if (total >= 250) {
        grade = "Grade 1";
        gradeOutput.className = "grade1";
      } else if (total >= 180) {
        grade = "Grade 2";
        gradeOutput.className = "grade2";
      } else if (total >= 120) {
        grade = "Grade 3";
        gradeOutput.className = "grade3";
      } else {
        grade = "Grade 4";
        gradeOutput.className = "grade4";
      }

      gradeOutput.innerHTML = grade;
    }

    slider.oninput = calculatePower;
    techniques.onchange = calculatePower;
    weapons.onchange = calculatePower;
    species.onchange = calculatePower;
    domains.onchange = calculatePower;

    calculatePower();
  </script>

</body>
</html>
